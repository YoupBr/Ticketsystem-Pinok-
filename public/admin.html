<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Bestellingen klaar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-[#00257b] min-h-screen">
  <div class="relative min-h-screen">
    <!-- Logo rechtsboven -->
    <div class="absolute top-1 right-1">
      <img src="/logo.png" alt="Logo" class="h-40 w-auto object-contain">
    </div>

    <div class="max-w-4xl mx-auto px-6 py-10">
      <h1 class="text-4xl font-bold mb-8">Pinoké Keuken</h1>
      <p class="text-lg mb-8">Voer hier het bestelnummer in dat klaar is om opgehaald te worden.</p>

      <form id="orderForm" class="flex flex-col sm:flex-row gap-4 mb-10">
        <input
          type="number"
          id="orderNumber"
          placeholder="Bestelnummer"
          required
          class="flex-1 border-2 border-[#00257b] rounded-xl px-5 py-4 text-2xl outline-none focus:ring-2 focus:ring-[#00257b]"
        />
        <button
          type="submit"
          class="bg-[#00257b] text-white px-8 py-4 rounded-xl text-xl font-semibold hover:opacity-90 transition"
        >
          Toevoegen
        </button>
      </form>

      <h2 class="text-2xl font-bold mb-4">Actieve bestellingen</h2>
      <div id="ordersList" class="space-y-4"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
