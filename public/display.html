<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bestellingen klaar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white overflow-hidden">
  <div class="min-h-screen relative p-6 md:p-10">
    <div class="relative z-10">
      <div class="text-center mb-8">
        <div class="text-center">
          <div class="text-4xl lg:text-6xl font-black tracking-tight uppercase">Bestellingen klaar:</div>
          <div class="text-2xl mt-4 uppercase text-slate-300">Nummers staan onderaan het bonnetje!</div>
        </div>
      </div>

      <div id="busyMessage" class="hidden mb-6 rounded-2xl border border-amber-400/40 bg-amber-400/10 px-6 py-4 text-center text-lg text-amber-100 shadow-lg">
        Het is momenteel erg druk. Bestellingen kunnen iets langer duren, onze excuses voor het ongemak.
      </div>

      <div id="recentOrders" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8"></div>

      <div id="otherOrdersWrapper" class="hidden mt-6">
        <div class="flex items-center gap-4 mb-4">
          <div class="h-px flex-1 bg-slate-700"></div>
          <div class="text-2xl font-semibold text-slate-300 uppercase tracking-wide">Also Ready</div>
          <div class="h-px flex-1 bg-slate-700"></div>
        </div>
        <div id="otherOrders" class="flex flex-wrap justify-center gap-4"></div>
      </div>

      <div id="emptyState" class="hidden min-h-[35vh] flex flex-col items-center justify-center text-center">
        <div class="mb-8 rounded-full bg-slate-800 p-8 ring-1 ring-slate-700">
          <span class="text-6xl">👨‍🍳</span>
        </div>
        <div class="text-3xl font-bold uppercase tracking-widest text-slate-300">Bestellingen worden bereid...</div>
      </div>
    </div>
  </div>

  <footer class="absolute bottom-6 left-0 w-full text-center text-lg text-white opacity-70">
    Powered by LarsFixt & MRY AV
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
